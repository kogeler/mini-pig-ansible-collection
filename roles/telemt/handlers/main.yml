- name: restart telemt
  ansible.builtin.systemd:
    name: "{{ _telemt_systemd_unit_name }}"
    enabled: yes
    daemon_reload: yes
    state: restarted
  ignore_errors: "{{ ansible_check_mode }}"

- name: restart telemt-decoy
  ansible.builtin.systemd:
    name: "{{ _telemt_decoy_systemd_unit_name }}"
    enabled: yes
    daemon_reload: yes
    state: restarted
  ignore_errors: "{{ ansible_check_mode }}"
