---
- name: Wait for pod service to become active
  ansible.builtin.systemd:
    name: podman-telemt-pod.service
  register: _pod_svc
  until: _pod_svc.status.ActiveState == 'active'
  retries: 20
  delay: 5

- name: Wait for pebble service to become active
  ansible.builtin.systemd:
    name: podman-telemt-pebble.service
  register: _pebble_svc
  until: _pebble_svc.status.ActiveState == 'active'
  retries: 20
  delay: 5

- name: Decoy service readiness with diagnostic-on-failure
  block:
    - name: Wait for decoy service to become active
      ansible.builtin.systemd:
        name: podman-telemt-decoy.service
      register: _decoy_svc
      until: _decoy_svc.status.ActiveState == 'active'
      retries: 20
      delay: 5
  rescue:
    # Caddy's stdout goes to the journal under the unit; without these
    # dumps we have no visibility into why Caddy exits with status 1
    # (the systemd state alone shows ExecMainStatus=1, no error text).
    - name: Capture telemt-decoy container logs # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: podman logs --tail 200 telemt-decoy
      register: _decoy_logs
      changed_when: false
      failed_when: false

    - name: Capture telemt-decoy systemd journal # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: journalctl -xeu podman-telemt-decoy.service --no-pager -n 200
      register: _decoy_journal
      changed_when: false
      failed_when: false

    # Container stdout/stderr (Caddy's actual error) is routed to journald
    # under the CONTAINER_NAME field, NOT under the service unit. The
    # `-xeu <unit>` filter above misses it. These two queries catch the
    # container output by name and by syslog identifier (`conmon` is
    # podman's container monitor that proxies the container streams).
    - name: Capture telemt-decoy container stdout via CONTAINER_NAME # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: journalctl CONTAINER_NAME=telemt-decoy --no-pager --since "10 minutes ago"
      register: _decoy_container_journal
      changed_when: false
      failed_when: false

    - name: Capture conmon-tagged journal lines # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: journalctl -t conmon --no-pager --since "10 minutes ago" -n 200
      register: _decoy_conmon_journal
      changed_when: false
      failed_when: false

    - name: Capture rendered Caddyfile and pebble root cert
      ansible.builtin.slurp:
        src: "{{ item }}"
      loop:
        - /opt/telemt/Caddyfile
        - /opt/telemt/pebble-root.pem
      register: _decoy_files
      failed_when: false

    - name: Capture pod state # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: podman ps -a --pod
      register: _decoy_ps
      changed_when: false
      failed_when: false

    # The error in the previous run was `socket: permission denied` from
    # Caddy's `socket(AF_INET, SOCK_STREAM)`. That syscall doesn't depend
    # on the port number — failure at this stage points to an LSM
    # (AppArmor / SELinux), seccomp, or sysctl restricting socket
    # creation under our `--cap-drop=ALL --security-opt=no-new-privileges
    # --read-only` flags. The probes below pin down which.

    - name: Capture kernel security-deny lines (dmesg) # noqa: command-instead-of-module risky-shell-pipe
      ansible.builtin.shell:
        cmd: |
          set -o pipefail +e
          dmesg --since "10 minutes ago" 2>&1 | grep -iE "denied|apparmor|seccomp|audit|capability" | tail -200
          exit 0
        executable: /bin/bash
      register: _decoy_dmesg
      changed_when: false
      failed_when: false

    - name: Capture AppArmor profile state # noqa: command-instead-of-module risky-shell-pipe
      ansible.builtin.shell:
        cmd: |
          set -o pipefail +e
          aa-status 2>&1 | head -80
          echo "---"
          ls /etc/apparmor.d/containers* 2>&1 || true
          echo "---"
          podman info --format '{{ "{{" }}.Host.Security{{ "}}" }}' 2>&1
          exit 0
        executable: /bin/bash
      register: _decoy_aa
      changed_when: false
      failed_when: false

    - name: Capture port-related sysctls # noqa: command-instead-of-module
      ansible.builtin.shell:
        cmd: |
          for k in net.ipv4.ip_unprivileged_port_start net.ipv4.ip_local_reserved_ports net.ipv4.ip_local_port_range net.core.somaxconn; do
            echo "$k = $(sysctl -n $k 2>/dev/null || echo '<unset>')"
          done
        executable: /bin/bash
      register: _decoy_sysctls
      changed_when: false
      failed_when: false

    # Reproduce the exact security context Caddy runs under, in a
    # minimal Python container, and try the same socket() call. If this
    # also fails with EACCES, the restriction is on the security flags,
    # not Caddy. If it succeeds, something Caddy-specific (config
    # reading, file write under /var/lib/caddy, cert pool, etc.) is the
    # actual culprit and the error message is misleading.
    - name: Reproduce socket() probe with the same security context # noqa: command-instead-of-module
      ansible.builtin.command:
        argv:
          - podman
          - run
          - --rm
          - --pod=telemt-pod
          - --cap-drop=ALL
          - --cap-add=NET_BIND_SERVICE
          - --security-opt=no-new-privileges
          - --read-only
          - docker.io/library/python:3.12-alpine
          - python3
          - -c
          - |
            import socket, sys
            try:
                s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                s.bind(("127.0.0.1", 2019))
                s.listen(1)
                print("OK: bind+listen 127.0.0.1:2019 succeeded under decoy security context")
                s.close()
            except Exception as e:
                print(f"FAIL: {type(e).__name__}: {e}", file=sys.stderr)
                sys.exit(1)
      register: _decoy_socket_probe
      changed_when: false
      failed_when: false

    - name: Print decoy crash diagnostics
      ansible.builtin.debug:
        msg: |-
          === podman logs telemt-decoy ===
          stdout:
          {{ _decoy_logs.stdout | default('<empty>') }}
          stderr:
          {{ _decoy_logs.stderr | default('<empty>') }}
          === journalctl CONTAINER_NAME=telemt-decoy ===
          {{ _decoy_container_journal.stdout | default('<empty>') }}
          === journalctl -t conmon ===
          {{ _decoy_conmon_journal.stdout | default('<empty>') }}
          === journalctl -xeu podman-telemt-decoy.service ===
          {{ _decoy_journal.stdout | default('<empty>') }}
          === podman ps -a --pod ===
          {{ _decoy_ps.stdout | default('<empty>') }}
          === dmesg (security-related last 10m) ===
          {{ _decoy_dmesg.stdout | default('<empty>') }}
          === AppArmor / podman security state ===
          {{ _decoy_aa.stdout | default('<empty>') }}
          === port sysctls ===
          {{ _decoy_sysctls.stdout | default('<empty>') }}
          === socket() reproducer (decoy security context) ===
          rc={{ _decoy_socket_probe.rc | default('?') }}
          stdout: {{ _decoy_socket_probe.stdout | default('<empty>') }}
          stderr: {{ _decoy_socket_probe.stderr | default('<empty>') }}
          === /opt/telemt/Caddyfile ===
          {{ (_decoy_files.results[0].content | default('') | b64decode) if _decoy_files.results | length > 0 else '<unreadable>' }}
          === /opt/telemt/pebble-root.pem ===
          {{ (_decoy_files.results[1].content | default('') | b64decode) if _decoy_files.results | length > 1 else '<unreadable>' }}

    - name: Re-raise decoy readiness failure
      ansible.builtin.fail:
        msg: >-
          podman-telemt-decoy.service never reached ActiveState=active.
          See diagnostics above.

- name: Wait for telemt service to become active
  ansible.builtin.systemd:
    name: podman-telemt.service
  register: _telemt_svc
  until: _telemt_svc.status.ActiveState == 'active'
  retries: 40
  delay: 5

- name: Wait for telemt listen port to accept connections
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ molecule_telemt_listen_port }}"
    timeout: 60

# Telemt's API + metrics listeners enforce loopback-only access (the API
# has a whitelist option but metrics has none); netavark DNAT rewrites
# the source for `127.0.0.1:<host_port>` traffic to the bridge gateway,
# so probes sent through the published host port get rejected. We
# bypass the publish path by execing curl inside the decoy (Caddy)
# container, which shares the pod's network namespace and so reaches
# telemt over real loopback.

- name: Wait for telemt /v1/health to return ok
  containers.podman.podman_container_exec:
    name: telemt-decoy
    argv:
      - curl
      - -fsS
      - --max-time
      - "5"
      - "http://127.0.0.1:{{ molecule_telemt_api_port }}/v1/health"
  register: _health
  changed_when: false
  until: _health.rc | default(1) == 0
  retries: 30
  delay: 2

- name: Wait for telemt /v1/health/ready to flip to true
  containers.podman.podman_container_exec:
    name: telemt-decoy
    argv:
      - curl
      - -fsS
      - --max-time
      - "5"
      - "http://127.0.0.1:{{ molecule_telemt_api_port }}/v1/health/ready"
  register: _ready
  changed_when: false
  until:
    - _ready.rc | default(1) == 0
    - ((_ready.stdout | from_json).data.ready | default(false)) | bool
  retries: 60
  delay: 5
