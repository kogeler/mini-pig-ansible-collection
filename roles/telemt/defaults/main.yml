# -- General ------------------------------------------------------------------

telemt_enabled: true
telemt_image: ghcr.io/telemt/telemt
telemt_image_tag: latest

# -- Paths --------------------------------------------------------------------

telemt_config_dir: /opt/telemt
# Path inside the container where config.toml is mounted
telemt_container_config_path: /run/telemt/config.toml

# -- Network ------------------------------------------------------------------

# Optional: attach the pod to a pre-existing podman network instead of the
# default one. Empty string keeps podman's default network. The role never
# creates or manages networks — create it out-of-band and set this to its
# name to attach (e.g. a dual-stack network providing IPv6 egress via NAT).
telemt_pod_network: ""

telemt_listen_port: 443

# -- Container options ---------------------------------------------------------

# Read-only root filesystem; telemt writes cache to tmpfs at /run/telemt
telemt_read_only_rootfs: true
# Mount tmpfs at /run/telemt for runtime cache (proxy-secret, tlsfront, etc.)
telemt_tmpfs_enabled: true
# Add :Z SELinux relabel to volume mounts
telemt_selinux_relabel: false

# AppArmor profile for the role's containers (telemt, decoy, pebble).
# Default `unconfined` because Ubuntu 24.04 + podman 4.9.3 ships a
# generated profile (`containers-default-0.57.4-apparmor1`) that denies
# `socket(AF_INET, SOCK_STREAM)` for any container without
# `apparmor=unconfined`, so the proxy and decoy can't open TCP sockets
# at all. Defense-in-depth still has `--cap-drop=ALL`, `--read-only`,
# `--security-opt=no-new-privileges`, and the pod's network isolation.
# Override to a specific profile name on hosts where you ship a custom
# AppArmor policy that doesn't break inet socket creation.
telemt_apparmor_profile: unconfined

# -- Extra container options ---------------------------------------------------

telemt_extra_env: {}
telemt_extra_volumes: []
# Additional podman run arguments (appended after built-in hardening flags)
telemt_extra_args: []
telemt_rust_log: ""

# -- Proxy modes ---------------------------------------------------------------
# At least one mode must be enabled.
# Default: Fake TLS only (anti-censorship deployment).

telemt_modes_classic: false
telemt_modes_secure: false
telemt_modes_tls: true

# -- General proxy config ------------------------------------------------------

telemt_use_middle_proxy: true

# -- Domain (required) ---------------------------------------------------------
# Server domain name. Used in proxy links and as tls_domain in Fake TLS mode.

telemt_domain: ""

# -- Link endpoints ------------------------------------------------------------
# Optional map of label -> IP (or hostname) used as `server=` in tg://proxy
# links. When non-empty, one link per user per endpoint is printed; the SNI
# embedded in the Fake TLS secret stays bound to telemt_domain regardless.
# When empty, a single link per user is printed with server=telemt_domain.
#
# Example:
#   telemt_link_endpoints:
#     primary: "203.0.113.10"
#     backup:  "203.0.113.11"

telemt_link_endpoints: {}

# -- Fake TLS / anti-censorship ------------------------------------------------

telemt_tls_mask: true
telemt_tls_emulation: true
telemt_tls_front_dir: tlsfront

# -- Users (required) ---------------------------------------------------------
# Dict of name -> 32-hex-char secret.  At least one user must be defined.
# Generate secrets with: openssl rand -hex 16

telemt_users: {}

# -- API -----------------------------------------------------------------------

telemt_api_enabled: false
# Host-side bind address when API port is published
telemt_api_bind: "127.0.0.1"
telemt_api_port: 9091
telemt_api_whitelist: []
# Set to true to publish API port on the host
telemt_publish_api: false

# -- Metrics -------------------------------------------------------------------

# Host-side bind address when metrics port is published
telemt_metrics_bind: "127.0.0.1"
telemt_metrics_port: 9090
# Set to true to publish metrics port on the host
telemt_publish_metrics: false

# -- Decoy site (mask host stub) ----------------------------------------------
# Caddy container serving a stub page with auto Let's Encrypt cert.
# Runs in the same podman pod (shared network namespace).
# TLS-ALPN-01 challenge passes through telemt TCP-splice to Caddy on localhost.

telemt_decoy_image: docker.io/library/caddy
telemt_decoy_image_tag: latest
# Domain for Let's Encrypt certificate. Defaults to telemt_domain if empty.
telemt_decoy_domain: ""
# ACME email for Let's Encrypt notifications (optional)
telemt_decoy_acme_email: ""
# Path to custom index.html for decoy site.
# When empty, the role uses its built-in files/index.html.
# Ignored when telemt_decoy_upstream_url is set.
telemt_decoy_index_html: ""

# When non-empty, Caddy reverse-proxies all unauthenticated traffic
# (i.e. the splice-spliced "wrong-secret" stream) to the given URL
# (e.g. `https://example.com`) instead of serving the local static
# decoy page. Caddy terminates HTTPS on the upstream side and rewrites
# the Host header so the upstream sees its own hostname. Absolute
# URLs and Location redirects from the upstream are NOT rewritten —
# pick a static-style upstream whose content does not leak its real
# domain. When set, telemt_decoy_index_html is ignored.
telemt_decoy_upstream_url: ""

# -- Molecule testing mode ----------------------------------------------------
# Deploys Pebble (Let's Encrypt's test ACME CA) as an additional container
# in the pod, points Caddy's `acme_ca` at it, and mounts Pebble's root cert
# into the decoy so Caddy can validate the ACME server. The TLS-ALPN-01
# challenge passes through the same TCP-splice path that real censor
# probes hit, which makes this scenario validate the full ACME → splice →
# Caddy ALPN handler chain. Never enable in production.

telemt_molecule_mode: false
