- name: iptables | Configure firewall
  tags: ["iptables"]
  block:
    # Shared probes — both backends and the SNAT module branch on a single
    # snapshot of host state.
    - name: iptables | Check docker systemd unit file exists
      ansible.builtin.stat:
        path: "/lib/systemd/system/docker.service"
      register: _iptables_docker_systemd_file_stat

    - name: iptables | Validate iptables_snat_rules
      ansible.builtin.assert:
        that:
          - item.to_source is defined
          - item.to_source | string | length > 0
          - (item.src_port is not defined and item.dst_port is not defined) or item.protocol is defined
        fail_msg: >-
          iptables_snat_rules[{{ ansible_loop.index0 }}] is invalid:
          `to_source` is required, and `protocol` must be set when
          `src_port` or `dst_port` is given. Got: {{ item }}
      loop: "{{ iptables_snat_rules }}"
      loop_control:
        extended: true
        label: "{{ item.to_source | default('<missing to_source>') }}"

    # Both backends and the randomized SNAT module need iptables and nft
    # binaries; install both unconditionally regardless of host state.
    - name: iptables | Install iptables and nftables packages
      ansible.builtin.apt:
        name:
          - iptables
          - nftables
        update_cache: true

    - name: iptables | Enable ipv4 forward
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        sysctl_set: true
      when: iptables_ipv4_forward_enable | bool

    # Reverse-migration guard. Each backend writes the marker on every
    # successful apply; switching from `nftables` back to scoped iptables
    # is not supported and must hard-fail here.
    - name: iptables | Stat firewall-backend marker
      ansible.builtin.stat:
        path: /var/lib/mini-pig-firewall-backend
      register: _iptables_backend_marker_stat

    - name: iptables | Read firewall-backend marker
      ansible.builtin.slurp:
        src: /var/lib/mini-pig-firewall-backend
      register: _iptables_backend_marker_raw
      when: _iptables_backend_marker_stat.stat.exists | bool

    - name: iptables | Assert no nftables → iptables reverse migration
      ansible.builtin.assert:
        that:
          - not (
              _iptables_backend_marker_stat.stat.exists | bool
              and (_iptables_backend_marker_raw.content | b64decode).strip() == 'nftables'
              and not (iptables_use_nftables | bool)
            )
        fail_msg: >-
          Host is already running the nftables backend (marker file
          /var/lib/mini-pig-firewall-backend says 'nftables'), but
          `iptables_use_nftables` is false. Migrating back from the
          nftables backend to iptables is intentionally not supported
          by this role. Either keep `iptables_use_nftables: true`, or
          migrate the host manually and remove the marker file before
          re-running this role.

    # Legacy / migration probes. Decide whether the host is coming from
    # iptables-persistent or a prior scoped iptables apply.
    - name: iptables | Stat legacy iptables rule files
      ansible.builtin.stat:
        path: "{{ item.path }}"
      register: _iptables_legacy_rule_file_stats
      loop:
        - { path: "/etc/iptables/rules.v4", cmd: "/usr/sbin/iptables" }
        - { path: "/etc/iptables/rules.v6", cmd: "/usr/sbin/ip6tables" }
      loop_control:
        label: "{{ item.path }}"

    - name: iptables | Stat netfilter-persistent unit
      ansible.builtin.stat:
        path: /lib/systemd/system/netfilter-persistent.service
      register: _iptables_netfilter_persistent_stat

    # Stat any leftover service unit from older role versions (legacy
    # mini-pig-iptables.service) so backend/migration logic can decide
    # to remove it.
    - name: iptables | Stat legacy mini-pig-iptables service file
      ansible.builtin.stat:
        path: /etc/systemd/system/mini-pig-iptables.service
      register: _iptables_legacy_scoped_service_stat

    # Unified firewall service + dispatcher. Rendered before backend
    # dispatch so each backend can `systemctl start` it once its files +
    # marker are in place.
    - name: iptables | Render unified firewall service plumbing
      ansible.builtin.include_tasks: firewall_service.yml

    # Backend dispatch. Two paths — scoped iptables, or nftables with an
    # in-place migration folded in.
    - name: iptables | Apply nftables backend
      ansible.builtin.include_tasks: nftables.yml
      when: iptables_use_nftables | bool

    - name: iptables | Apply scoped iptables backend
      ansible.builtin.include_tasks: iptables.yml
      when: not (iptables_use_nftables | bool)

    # Randomized SNAT module — backend-independent. Loads a native nft
    # chain at `priority srcnat - 10`, which the kernel evaluates ahead of
    # every iptables-nft chain at `srcnat`. Also tears down legacy
    # artefacts and enables the firewall re-assertion timer.
    - name: iptables | Apply randomized SNAT module
      ansible.builtin.include_tasks: randomized_snat.yml
