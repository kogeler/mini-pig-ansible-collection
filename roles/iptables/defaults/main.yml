# May be a single interface name (string) or a list of interface names.
# When unset, an empty string or an empty list, the default IPv4 interface is used.
iptables_inf_ext: "{{ ansible_facts['default_ipv4']['interface'] }}"

iptables_ports:
  - port: 22
    protocol: tcp
#  - port: 80
#    protocol: tcp
#    src_v4: 0.0.0.0/0
#    src_v6: ::/0
#    skip_v6: false
iptables_forwarded_ports: []
#  # DNAT + FORWARD allow
#  - forwarded_inf: eth0
#    forwarded_port: 22
#    protocol: tcp
#    dst_port: 22
#    dst_address: 192.168.1.1
#  # FORWARD allow only (no DNAT) — used when dst_* are omitted
#  - forwarded_inf: wg0
#    forwarded_port: 443
#    protocol: tcp
#    src_v4: 10.0.0.0/8
iptables_docker_ports: []
#  - port: 80
#    protocol: tcp
#    src_v4: 0.0.0.0/0

iptables_randomized_ext_ips: []

# Minutes between drift-check runs. Idempotent — no-op when state is
# already correct. Set to 0 to disable the timer.
iptables_drift_check_interval: 10

# Static SNAT rules. Rendered into the role's scoped chain ahead of the
# generic masquerade block so the narrow match terminates first:
#   * scoped iptables backend → `MPIG-POSTROUTING` (jumped from base
#     `nat POSTROUTING` via the role-owned anchor).
#   * nftables backend → `table ip mpig_nat / chain postrouting`.
# Independent of the randomized SNAT mechanism above — protocol/port match
# scopes prevent overlap. Each item must define `to_source`; all other
# fields are optional. `output_inf` is rendered as `-o <iface>` (iptables)
# / `oifname "<iface>"` (nft) only when explicitly set — when omitted, the
# rule has no output-interface clause and matches every output interface.
# If `src_port` or `dst_port` is set, `protocol` is required (validated at
# apply time in tasks/main.yml).
iptables_snat_rules: []
#  - to_source: 203.0.113.10
#    protocol: udp
#    dst_port: 51820
#  - to_source: 203.0.113.11
#    protocol: tcp
#    dst_port: 443
#    output_inf: eth0
#  - to_source: 203.0.113.12
#    protocol: tcp
#    src_port: 8080
#    dst_address: 10.20.0.0/16

iptables_external_ping_enable: false
# per minute
iptables_external_ping_limit: 10
# block outgoing connections to local addresses
iptables_disable_local_output: false
iptables_disable_local_excluded_ipv4_ranges: []
iptables_disable_local_excluded_ipv6_ranges: []
# for k8s nodes
iptables_ipv4_forward_enable: false
iptables_ext_inf_masquerade: false

# Backend selector. `false` → scoped iptables (MPIG-* chains rendered by
# the apply script and loaded via mini-pig-firewall.service). `true` →
# nftables (role-owned `mpig_*` tables in /etc/nftables.conf, applied via
# a flat `nft -f` from the same service). All other variables keep the
# same shape across backends.
#
# Randomized SNAT (`iptables_randomized_ext_ips`) is backend-independent:
# it lives in its own nft table `mpig_randomized_snat` at
# `priority srcnat - 10`, so the kernel preempts every iptables-nft chain
# at `srcnat` (kube-proxy, Kilo CNI, our own MPIG masquerade) regardless
# of this flag.
#
# Supported OS: Debian 12 (bookworm, nft 1.0.6) and newer / Ubuntu 22.04
# (jammy) and newer when `iptables_use_nftables: true`. Atomic
# delete-then-create lives in-file via the `add table; delete table;
# table {…}` idiom (not `destroy table`, which 1.0.6 rejects) — keep
# that pattern.
#
# false → true is an in-place migration: native nft tables are loaded
# BEFORE iptables-nft is wiped, so the kernel firewall stays covered
# throughout. The wipe also clears foreign iptables-nft chains
# (KUBE-*, DOCKER-*, libvirt, …) as a one-time cost — restart foreign
# managers or reboot the host after migration. See README "Migration".
# nftables → iptables is intentionally rejected.
iptables_use_nftables: false
