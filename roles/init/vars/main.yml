_init_packages:
  - "apt-transport-https"
  - "apt-file"
  - "sudo"
  - "bash-completion"
  - "python3-pip"
  - "python3-setuptools"
  - "gpg"
  - "vlan"
  - "lvm2"
  - "btrfs-progs"
  - "sysfsutils"
  - "systemd-timesyncd"
  - "htop"
  - "iotop"
  - "net-tools"
  - "nano"
  - "tmux"
  - "mosh"
  - "rsync"
  - "curl"
  - "btrfs-compsize"
  - "wget"
  - "netcat-openbsd"

_init_packages_remove:
  - "linux-xanmod"
  - "linux-xanmod-x64v1"
  - "chrony"

_init_timesyncd_conf_path: "/etc/systemd/timesyncd.conf"
_init_timesyncd_unit_path: "/lib/systemd/system/systemd-timesyncd.service"

_init_systemd_resolved_unit_path: "/lib/systemd/system/systemd-resolved.service"

_init_apt_auto_upgrades_conf_path: "/etc/apt/apt.conf.d/20auto-upgrades"

_init_sysctl_parameters:
  fs.inotify.max_user_instances: 8192
  fs.inotify.max_queued_events: 32768
  fs.inotify.max_user_watches: 1013352
