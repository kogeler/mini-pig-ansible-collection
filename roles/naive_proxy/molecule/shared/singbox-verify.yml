---
# Verify playbook for the singbox-stress scenario.
#
# This is an intentionally narrow verify: it only exercises the sing-box
# Naive outbound stress path. The full role contract (cert renewal,
# decoy modes, official-naive SOCKS5 client, ...) is already covered by
# shared/verify.yml which runs in the default and debian-bookworm
# scenarios. Keeping this playbook focused on the reproducer makes
# failures here unambiguous about *which* component is broken.
- name: Verify (singbox stress)
  hosts: all
  gather_facts: false
  vars_files:
    - vars/common.yml
    - vars/benchmark.yml
    - vars/singbox-benchmark.yml
  tasks:
    - name: Wait for verify prerequisites
      ansible.builtin.import_tasks: tasks/wait-services.yml

    # -- HAProxy diagnostics surface ------------------------------------------
    # Run before the stress benchmark so that if the diagnostics surface is
    # broken we fail fast with a clear message instead of timing out on the
    # 60+ second sing-box benchmark step.
    - name: Verify HAProxy diagnostics surface
      ansible.builtin.import_tasks: tasks/verify-diagnostics.yml
      when: naive_proxy_haproxy_diagnostics_enabled | default(false)
      vars:
        naive_proxy_haproxy_diagnostics_port: "{{ naive_proxy_haproxy_diagnostics_port | default(19999) }}"

    - name: Run sing-box stress benchmark
      ansible.builtin.import_tasks: tasks/singbox-benchmark.yml
