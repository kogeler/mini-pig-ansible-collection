---
# Official-naive SOCKS5 benchmark. The client-specific bits stay here
# (download/extract are done in shared/tasks/prepare.yml; this file
# launches the naive client container, runs a smoke test, and asserts
# the journal looks healthy). The transport-level pieces — SOCKS smoke
# test, iperf3 server, iperf3 + proxychains + CPU run, throughput
# assertion — are pulled in from shared tasks so the sing-box stress
# benchmark can reuse them without duplication.

- name: Download pebble root CA cert
  ansible.builtin.get_url:
    url: "{{ molecule_naive_proxy_pebble_root_url }}"
    dest: /usr/local/share/ca-certificates/pebble-ca.crt
    validate_certs: false
    mode: "0644"

- name: Update CA certificates
  ansible.builtin.command:
    cmd: update-ca-certificates
  changed_when: true

- name: Install naive client systemd unit
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ naive_client_unit }}"
    mode: "0644"
    content: |
      [Unit]
      Description=NaiveProxy molecule test client (containerised)
      RequiresMountsFor=%t/containers

      [Service]
      Environment=PODMAN_SYSTEMD_UNIT=%n
      Type=notify
      NotifyAccess=all
      Restart=on-failure
      RestartSec=5
      TimeoutStartSec=300
      TimeoutStopSec=70
      Delegate=yes
      KillMode=mixed
      ExecStartPre=/bin/rm \
              -f %t/%n.ctr-id
      ExecStart=/usr/bin/podman container run \
              --cidfile=%t/%n.ctr-id \
              --cgroups=split \
              --log-driver=passthrough \
              --sdnotify=conmon \
              --replace \
              --name {{ naive_client_container_name }} \
              --network host \
              --security-opt=apparmor=unconfined \
              --volume /tmp/naiveproxy-{{ naive_proxy_naive_version }}-linux-x64/naive:/usr/bin/naive:ro \
              --volume /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro \
              {{ naive_client_image }}:{{ naive_client_image_tag }} \
              naive \
              --listen=socks://127.0.0.1:{{ naive_client_socks_port }} \
              --proxy=https://testuser:testpass@{{ molecule_naive_proxy_domain }}:{{ molecule_naive_proxy_listen_port }} \
              --log
      ExecStop=/usr/bin/podman stop \
              --ignore -t 10 \
              --cidfile=%t/%n.ctr-id
      ExecStopPost=/usr/bin/podman rm \
              -f \
              --ignore -t 10 \
              --cidfile=%t/%n.ctr-id

- name: Start naive client container
  ansible.builtin.systemd:
    name: "{{ naive_client_unit }}"
    state: restarted
    daemon_reload: true

- name: Wait for naive client to start listening
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ naive_client_socks_port }}"
    timeout: 30

# -- SOCKS5 smoke test (shared) ------------------------------------------

- name: Smoke-test the official-naive SOCKS5 tunnel
  ansible.builtin.include_tasks: socks-decoy-smoke.yml
  vars:
    _socks_smoke_proxy_host: "{{ molecule_naive_proxy_domain }}"
    _socks_smoke_proxy_port: "{{ naive_client_socks_port }}"
    _socks_smoke_label: "official-naive SOCKS5 tunnel"

# -- naive client journal sanity (client-specific) ----------------------

- name: Read naive client log
  ansible.builtin.command:
    cmd: "journalctl -u {{ naive_client_unit }} --no-pager -n 50"
  register: _naive_log_raw
  changed_when: false

- name: Set naive client log fact
  ansible.builtin.set_fact:
    _naive_log: "{{ _naive_log_raw.stdout }}"

- name: Print naive client log
  ansible.builtin.debug:
    var: _naive_log

- name: Assert VPN tunnel negotiated without errors
  ansible.builtin.assert:
    that:
      - "('Listening on socks://127.0.0.1:' ~ (naive_client_socks_port | string)) in _naive_log"
      - "'negotiated padding type: None' not in _naive_log"
      - "'ERR_TUNNEL_CONNECTION_FAILED' not in _naive_log"
      - "'ERR_PROXY_CONNECTION_FAILED' not in _naive_log"
      - "'ERR_PROXY_CERTIFICATE_INVALID' not in _naive_log"
      - "'ERR_PROXY_AUTH' not in _naive_log"

# -- iperf3 server + iperf3 client + CPU + assertions (all shared) -------

- name: Start iperf3 server inside naive pod
  ansible.builtin.import_tasks: iperf-server.yml

- name: Run iperf3 stress through official-naive SOCKS5 tunnel
  ansible.builtin.include_tasks: iperf-bench.yml
  vars:
    _iperf_bench_socks_host: "127.0.0.1"
    _iperf_bench_socks_port: "{{ naive_client_socks_port }}"
    _iperf_bench_proxychains_conf: /tmp/proxychains-naive.conf
    _iperf_bench_parallel: "{{ iperf_parallel }}"
    _iperf_bench_duration: "{{ iperf_duration }}"
    _iperf_bench_min_bps: 1000000
    _iperf_bench_label: "official-naive SOCKS5 tunnel"

# -- Cleanup -------------------------------------------------------------

- name: Stop iperf3 benchmark container
  ansible.builtin.systemd:
    name: "{{ iperf_unit }}"
    state: stopped
  failed_when: false

- name: Stop naive client container
  ansible.builtin.systemd:
    name: "{{ naive_client_unit }}"
    state: stopped
  failed_when: false
