---
# gha (mp_driver=native) only — the podman scenarios inject the same
# mapping via molecule.yml `etc_hosts`, and /etc/hosts in the container
# is a bind-mount that lineinfile's atomic-rename can't replace.
- name: Ensure naive.test resolves to loopback
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 {{ molecule_naive_proxy_domain }}"
    regexp: '^127\.0\.0\.1\s+{{ molecule_naive_proxy_domain | regex_escape }}\s*$'
    state: present
  when: mp_driver != 'podman'

- name: Install test dependencies
  ansible.builtin.apt:
    name:
      - curl
      - iperf3
      - xz-utils
      - procps
      - proxychains4
      # The molecule trixie base image does not pre-install dbus; it
      # gets pulled in later as an `apt-get install podman` recommend,
      # but we need it earlier so the next task can start dbus.socket
      # before podman touches anything.
      - dbus
    update_cache: true
    state: present

- name: Ensure dbus.socket is running inside the molecule instance
  # Podman uses the systemd cgroup driver by default in rootful mode, which
  # makes crun (the OCI runtime) talk to systemd through D-Bus. On the
  # docker.io/library/debian:trixie base image the dbus package is
  # installed but dbus.socket is `static` (no [Install] section), so it
  # is not auto-started during the container's systemd bring-up the way
  # it would be on a normal boot — crun then fails with
  # `cannot open sd-bus: No such file or directory` when the first pod
  # tries to start. Starting dbus.socket here makes the subsequent pod
  # creation deterministic across scenarios.
  ansible.builtin.systemd:
    name: dbus.socket
    state: started
  when: mp_driver == 'podman'

- name: Download naive client
  ansible.builtin.get_url:
    url: "https://github.com/klzgrad/naiveproxy/releases/download/{{ naive_proxy_naive_version }}/naiveproxy-{{ naive_proxy_naive_version }}-linux-x64.tar.xz"
    dest: /tmp/naiveproxy.tar.xz
    mode: "0644"
    timeout: 120
  register: _naive_download
  retries: 3
  delay: 10
  until: _naive_download is not failed

- name: Extract naive client
  ansible.builtin.unarchive:
    src: /tmp/naiveproxy.tar.xz
    dest: /tmp/
    remote_src: true
    creates: "/tmp/naiveproxy-{{ naive_proxy_naive_version }}-linux-x64/naive"
