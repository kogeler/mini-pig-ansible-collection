---
# Shared role-application step used by every converge play (default,
# debian-bookworm, gha via shared/converge.yml; singbox-stress via its
# scenario-local converge.yml). Centralised here so the role-vars
# dict — domain, listen/external ports, IP map, users, molecule_mode,
# diagnostics surface, naive backend verbosity — has exactly one
# definition. Reads from `shared/vars/common.yml`.
#
# Crank chromium net-stack verbosity (`--v=1`) so the backend journal
# carries VERBOSE1 lines (TLS handshakes, HTTP/2 frames, padding
# negotiation) that make CI failures self-diagnosable. Diagnostics
# surface is enabled so `tasks/verify-diagnostics.yml` can confirm the
# admin socket and `ring h2trace` are reachable on 127.0.0.1.

- name: Apply naive_proxy role with molecule overrides
  ansible.builtin.include_role:
    name: kogeler.mini_pig.naive_proxy
  vars:
    naive_proxy_domain: "{{ molecule_naive_proxy_domain }}"
    naive_proxy_anytls_domain: "{{ molecule_naive_proxy_anytls_domain }}"
    naive_proxy_external_ip_auto: "{{ molecule_naive_proxy_external_ip_map_auto }}"
    naive_proxy_external_ip_manual: "{{ molecule_naive_proxy_external_ip_map_manual }}"
    naive_proxy_client_config_dir: "{{ molecule_naive_proxy_client_config_dir }}"
    naive_proxy_listen_port: "{{ molecule_naive_proxy_listen_port }}"
    naive_proxy_external_port: "{{ molecule_naive_proxy_external_port }}"
    naive_proxy_users: "{{ molecule_naive_proxy_users }}"
    naive_proxy_molecule_mode: true
    # AnyTLS cert in molecule: static self-signed by default; the anytls-stress
    # scenario flips these on to issue from the local Pebble CA via real ACME.
    naive_proxy_anytls_acme_in_molecule: "{{ molecule_naive_proxy_anytls_acme_in_molecule | default(false) }}"
    naive_proxy_anytls_acme_directory_ca: "{{ molecule_naive_proxy_anytls_acme_directory_ca | default('') }}"
    # AnyTLS client uTLS fingerprint: off by default; the anytls-stress
    # scenario set_facts it to 'firefox' so the rendered client configs (and
    # the wire-captured handshake) mimic Firefox.
    naive_proxy_anytls_utls_fingerprint: "{{ molecule_naive_proxy_anytls_utls_fingerprint | default('') }}"
    naive_proxy_backend_naive_args:
      - "--v=1"
    naive_proxy_haproxy_diagnostics_enabled: true
    # Override the role's prod urltest defaults so probes target the
    # molecule's own decoy (no internet egress) and fire often enough to
    # actually run during verify.
    naive_proxy_singbox_urltest_url: "{{ molecule_naive_proxy_singbox_urltest_url }}"
    naive_proxy_singbox_urltest_interval: "{{ molecule_naive_proxy_singbox_urltest_interval }}"
    # Client-config QR PNGs are generated on the CONTROLLER (delegate_to:
    # localhost). For podman scenarios that controller is the dev host, which we
    # must not mutate to install qrcode/Pillow (host-isolation policy), so QR is
    # OFF there. Only the gha scenario — where controller == target == runner —
    # enables it (toggle set in gha/inventory/hosts.yml, deps installed in
    # prepare). Inventory-only so the vars_files default can't mask it.
    naive_proxy_client_qr_enabled: "{{ molecule_naive_proxy_client_qr_enabled | default(false) }}"
