---
naive_client_unit: "podman-naive-molecule-client.service"
naive_client_container_name: "naive-molecule-client"
naive_client_image: "docker.io/library/ubuntu"
naive_client_image_tag: "22.04"
naive_client_socks_port: 1080
iperf_unit: "podman-naive-iperf-bench.service"
iperf_image: "docker.io/networkstatic/iperf3"
iperf_container_name: "naive-iperf-bench"
iperf_port: 5201
iperf_duration: 30
# Tiny image (has busybox `awk`) the TUN benchmarks use to read the sing-box
# client's tun byte counter from inside its netns (/proc/net/dev), to prove the
# stress traffic actually traversed the tunnel rather than taking a direct
# bridge route. Read-only; no extra caps.
iperf_helper_image: "docker.io/library/busybox"
# iperf3 -P value used by both the official-naive benchmark and the
# sing-box stress benchmark. 16 exercises HAProxy / naive backend H2
# stream multiplexing under burst CONNECT load — that is the failure
# surface sing-box / SFA users report. Kept symmetrical between the
# two benchmarks so their throughput numbers are directly comparable.
iperf_parallel: 16
iperf_cpu_units:
  - unit: "podman-naive-haproxy.service"
    label: "naive-haproxy"
  - unit: "podman-naive-backend.service"
    label: "naive-backend"
  - unit: "{{ iperf_unit }}"
    label: "{{ iperf_container_name }}"
