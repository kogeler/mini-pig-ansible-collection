---
- name: Converge
  hosts: all
  vars_files:
    - vars/common.yml
  roles:
    - role: kogeler.mini_pig.naive_proxy
      vars:
        naive_proxy_domain: "{{ molecule_naive_proxy_domain }}"
        # Map form: exercise multi-IP rendering. Both entries point at
        # the same loopback address — the goal is to verify per-suffix
        # config files are produced, not separate routes.
        naive_proxy_external_ip: "{{ molecule_naive_proxy_external_ip_map }}"
        naive_proxy_listen_port: "{{ molecule_naive_proxy_listen_port }}"
        naive_proxy_external_port: "{{ molecule_naive_proxy_external_port }}"
        naive_proxy_users:
          testuser: "testpass"
        naive_proxy_molecule_mode: true
        # Crank chromium net-stack verbosity in molecule so the backend
        # journal carries VERBOSE1 lines (TLS handshakes, HTTP/2 frames,
        # padding negotiation) that make CI failures self-diagnosable.
        naive_proxy_backend_naive_args:
          - "--v=1"
        # Exercise the opt-in HAProxy diagnostics surface in CI: pod
        # publishes the admin socket on 127.0.0.1:<port>, the H2 trace
        # ring is declared in haproxy.cfg. shared/tasks/verify-diagnostics.yml
        # asserts both are reachable and the CLI answers `show info`.
        naive_proxy_haproxy_diagnostics_enabled: true
