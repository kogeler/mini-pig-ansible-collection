---
# Default converge for default / debian-bookworm / gha. The
# singbox-stress scenario uses its own scenario-local converge that
# applies kogeler.mini_pig.ssl_router on top to mirror the prod
# topology — both converge plays share the same naive_proxy role-vars
# dict via tasks/converge-naive-proxy.yml.
- name: Converge
  hosts: all
  vars_files:
    - vars/common.yml
  tasks:
    - name: Apply naive_proxy
      ansible.builtin.import_tasks: tasks/converge-naive-proxy.yml
