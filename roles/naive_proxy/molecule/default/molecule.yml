---
# Default scenario: podman-in-podman, Debian trixie.
# Shared config (deps, verifier, host_vars defaults, callbacks_enabled,
# default playbooks) lives in `.config/molecule/config.yml` at the repo
# root and is auto-loaded by molecule. Only scenario-specific bits live
# here.
driver:
  name: podman
platforms:
  - name: molecule-naive-proxy
    image: "docker.io/library/debian:trixie"
    pre_build_image: false
    systemd: always
    # Rootless podman network mode for the molecule instance.
    # Supported values: host, slirp4netns (rootless default), bridge,
    # pasta (podman >= 5.0). NOTE: the molecule-podman create play
    # reads "network", not "network_mode" — using the wrong key
    # silently falls back to the default.
    network: "${MP_NETWORK:-slirp4netns}"
    # podman-in-podman: unmask /proc for newuidmap, caps for nested userns
    security_opts:
      - "label=disable"
      - "unmask=/proc/*"
      - "apparmor=unconfined"
    capabilities:
      - SYS_ADMIN
      - SETUID
      - SETGID
      - NET_ADMIN
    etc_hosts:
      naive.test: "127.0.0.1"
    devices:
      - /dev/fuse:/dev/fuse
    command: ""
    override_command: false
provisioner:
  inventory:
    host_vars:
      molecule-naive-proxy:
        # Generate the client-config QR PNGs and decode-round-trip them only in
        # this scenario — keeps the controller-side qrcode/Pillow dependency
        # scoped to one place. Inventory host_var (deep-merged with the base's
        # mp_driver) so vars_files can't mask it. prepare ensures the dep on the
        # controller; verify-clients decodes each PNG with kogeler.mini_pig.qr_decode.
        molecule_naive_proxy_client_qr_enabled: true
