---
all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: "{{ ansible_playbook_python }}"
      # Override the default (podman) so the shared prepare task's
      # `mp_driver != 'podman'` branch fires and writes the
      # `naive.test` line to the runner's /etc/hosts. The runner has a
      # real /etc/hosts that lineinfile can manage — there is no
      # molecule-injected etc_hosts mechanism here.
      mp_driver: native
