---
# GHA scenario: applies the role directly to the runner VM (no nested
# containers). Uses ansible-native configuration — no driver/platforms.
# Locally, use the default (podman) scenario instead.
#
# Shared config (deps, verifier, callbacks_enabled, default playbooks)
# inherited from `.config/molecule/config.yml` at the repo root. Only
# the GHA-specific overrides live here.
ansible:
  executor:
    backend: ansible-playbook
    args:
      ansible_playbook:
        - --diff
        - --inventory=inventory/
  env:
    ANSIBLE_FORCE_COLOR: "true"
  cfg:
    # Adds to the shared `defaults.callbacks_enabled` (deep-merged).
    privilege_escalation:
      become: "true"
scenario:
  test_sequence:
    - prepare
    - converge
    - idempotence
    - verify
