---
# debian-bookworm scenario: podman-in-podman, Debian bookworm.
# Shared config in `.config/molecule/config.yml` at the repo root.
driver:
  name: podman
platforms:
  - name: molecule-naive-proxy
    image: "docker.io/library/debian:bookworm"
    pre_build_image: false
    systemd: always
    network: "${MP_NETWORK:-slirp4netns}"
    security_opts:
      - "label=disable"
      - "unmask=/proc/*"
      - "apparmor=unconfined"
    capabilities:
      - SYS_ADMIN
      - SETUID
      - SETGID
      - NET_ADMIN
    etc_hosts:
      naive.test: "127.0.0.1"
    devices:
      - /dev/fuse:/dev/fuse
    command: ""
    override_command: false
