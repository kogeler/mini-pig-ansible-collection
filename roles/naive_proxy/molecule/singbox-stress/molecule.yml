---
# singbox-stress scenario.
#
# Mirrors the `default` scenario (dual-driver, MP_DRIVER selects podman
# or vagrant at runtime) but swaps the verify playbook for the sing-box
# Naive outbound stress reproducer. Use this scenario to chase the
# "stream failed: http2 protocol error" / "connection upload closed"
# failures reported by sing-box / SFA clients against a deployed
# naive_proxy stack.
dependency:
  name: galaxy
driver:
  name: "${MP_DRIVER:-podman}"
  # vagrant-only; podman ignores it
  provider:
    name: "${MP_VAGRANT_PROVIDER:-libvirt}"
platforms:
  - name: molecule-naive-proxy
    # ---- podman driver keys ----
    image: "docker.io/library/debian:trixie"
    pre_build_image: false
    systemd: always
    network: "${MP_NETWORK:-slirp4netns}"
    security_opts:
      - "label=disable"
      - "unmask=/proc/*"
      - "apparmor=unconfined"
    capabilities:
      - SYS_ADMIN
      - SETUID
      - SETGID
      - NET_ADMIN
    etc_hosts:
      naive.test: "127.0.0.1"
    devices:
      - /dev/fuse:/dev/fuse
    command: ""
    override_command: false
    # ---- vagrant driver keys ----
    box: "${MP_BOX:-debian/trixie64}"
    memory: "${MP_VM_MEMORY:-2048}"
    cpus: "${MP_VM_CPUS:-8}"
provisioner:
  name: ansible
  options:
    D: true
  playbooks:
    prepare: prepare.yml
    # Scenario-local converge — applies kogeler.mini_pig.ssl_router on
    # top of the naive_proxy role to mirror the real-prod topology
    # (ssl-router on :443 in front of HAProxy on :8443).
    converge: converge.yml
    verify: ../shared/singbox-verify.yml
  inventory:
    # Build-time pins for Dockerfile.j2. `group_vars.all` is the only
    # scenario-level vars location molecule loads into BOTH the create
    # play (which renders Dockerfile.j2 against `localhost`) and the
    # converge/verify plays. Pin the sing-box version + Go toolchain to
    # whatever SagerNet/sing-box-for-android currently ships
    # (version.properties → VERSION_NAME, GO_VERSION). Bumping SFA → bump
    # these values and run `molecule destroy` + `molecule converge` to
    # rebuild the molecule instance image.
    group_vars:
      all:
        singbox_build_version: "v1.14.0-alpha.20"
        singbox_build_tags: "with_clash_api,with_quic,with_utls,with_naive_outbound,with_purego"
        singbox_build_go_version: "1.25.9"
        # cronet-go GitHub release that ships the matching libcronet.so.
        # MUST be the same chromium revision as the cronet-go commit
        # sing-box pulls in via go.mod, otherwise the C ABI between the
        # sing-box-bundled cronet-go bindings and libcronet.so can drift.
        # For sing-box v1.14.0-alpha.20: go.mod pins
        # github.com/sagernet/cronet-go @ commit cd09eb3e271b
        # (2026-04-13 09:29 UTC, chromium 147.0.7727.49); cronet-go release
        # v147.0.7727.49-1 (2026-04-13 12:07 UTC) is built from the same
        # chromium revision and so its libcronet.so matches the bindings
        # SFA ships in libbox.aar. Bump together with `singbox_build_version`.
        singbox_cronet_version: "v147.0.7727.49-1"
    host_vars:
      molecule-naive-proxy:
        ansible_become: '{{ (lookup("env", "MP_DRIVER") | default("podman", true)) != "podman" }}'
  config_options:
    defaults:
      callbacks_enabled: ansible.posix.profile_tasks
verifier:
  name: ansible
