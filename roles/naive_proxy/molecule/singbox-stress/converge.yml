---
# Converge for singbox-stress.
#
# Mirrors the production topology more closely than shared/converge.yml:
# real deployments put `kogeler.mini_pig.ssl_router` (nginx with
# `ssl_preread`) in front of HAProxy on :443 and SNI-route by hostname
# to the HAProxy frontend. We replicate that here so the sing-box
# stress reproducer exercises the full chain — sing-box → ssl-router
# (TCP/SNI) → HAProxy (TLS terminate, naive auth) → naive backend —
# and not just sing-box → HAProxy direct.
- name: Converge
  hosts: all
  vars_files:
    - ../shared/vars/common.yml
  roles:
    - role: kogeler.mini_pig.naive_proxy
      vars:
        naive_proxy_domain: "{{ molecule_naive_proxy_domain }}"
        # Map form (multi-IP). See shared/vars/common.yml for the entry
        # set; both entries resolve back to the molecule loopback so the
        # singbox-stress reproducer can keep using
        # `molecule_naive_proxy_external_ip` as its single client target.
        naive_proxy_external_ip: "{{ molecule_naive_proxy_external_ip_map }}"
        naive_proxy_listen_port: "{{ molecule_naive_proxy_listen_port }}"
        naive_proxy_external_port: "{{ molecule_naive_proxy_external_port }}"
        naive_proxy_users:
          testuser: "testpass"
        naive_proxy_molecule_mode: true
        # Crank chromium net-stack verbosity in molecule so the backend
        # journal carries VERBOSE1 lines (TLS handshakes, HTTP/2 frames,
        # padding negotiation) that make CI failures self-diagnosable.
        naive_proxy_backend_naive_args:
          - "--v=1"
        # Exercise the opt-in HAProxy diagnostics surface in CI; the
        # singbox-verify playbook (shared/singbox-verify.yml) asserts
        # the admin socket is reachable on 127.0.0.1 and answers
        # HAProxy CLI commands.
        naive_proxy_haproxy_diagnostics_enabled: true
    - role: kogeler.mini_pig.ssl_router
      vars:
        # Public-facing port the sing-box client hits — same as a real
        # deployment, where ssl-router is the only thing on :443.
        ssl_router_https_port: 443
        # Single SNI route: naive.test → HAProxy listen port. The match
        # is anchored (^...$ in the template) so we use a regex that
        # accepts the bare host plus optional :port suffix some clients
        # send through SNI.
        ssl_router_upstream_map:
          naive:
            regex: '.*{{ molecule_naive_proxy_domain | regex_escape }}'
            host: "127.0.0.1"
            port: "{{ molecule_naive_proxy_listen_port }}"
