# -- General ------------------------------------------------------------------

naive_proxy_enabled: true

# Force-pull fresh runtime images for long-running services near the start of
# the role. Intended for already provisioned hosts. When enabled, only HAProxy
# and decoy images are refreshed. ACME and molecule-only Pebble are
# intentionally excluded.
naive_proxy_update_runtime_images: false

# -- Domain (required) --------------------------------------------------------
# Server FQDN. Used for TLS certificate and HAProxy site address.

naive_proxy_domain: ""

# Public IP that `naive_proxy_domain` resolves to. Required: client
# configs use this directly in the naive outbound `server` field so the
# sing-box / cronet client never needs to do DNS for the proxy itself
# (no chicken-and-egg with bootstrap DNS through a not-yet-established
# tunnel). The TLS SNI continues to be `naive_proxy_domain` via
# `tls.server_name`. Set to a public reachable IPv4 or IPv6 of the
# server. The role itself does not bind to this address — it is only
# rendered into the generated client configs.

naive_proxy_external_ip: ""

# -- Users (required) ---------------------------------------------------------
# Dict of name -> password.  At least one user must be defined.
# Passwords are used for HTTP basic auth (Proxy-Authorization header).
# Users are configured in BOTH HAProxy (userlist) and naive backend (--listen).

naive_proxy_users: {}

# -- Naive backend ------------------------------------------------------------
# Official standalone naive binary from klzgrad/naiveproxy releases.
# Releases: https://github.com/klzgrad/naiveproxy/releases

naive_proxy_naive_version: "v148.0.7778.96-2"
naive_proxy_padding: true
# Base image for the naive backend container build.
naive_proxy_backend_base_image: "docker.io/library/ubuntu"
naive_proxy_backend_base_image_tag: "22.04"

# -- Images -------------------------------------------------------------------

naive_proxy_haproxy_image: "docker.io/library/haproxy"
# Pin the current HAProxy major instead of floating on the lts alias.
# Defaults to 3.3 because of the H2 demux backpressure tuning we expose
# below (`tune.h2.fe.initial-window-size`, `tune.h2.max-frame-size`)
# and because 3.3 contains the `ring` infrastructure used by the
# diagnostics toggle. Override to `3.2-alpine` (the previous LTS) if you
# need long-term stability over the latest demuxer behaviour.
naive_proxy_haproxy_image_tag: "3.3-alpine"
naive_proxy_decoy_image: "docker.io/library/caddy"
naive_proxy_decoy_image_tag: "latest"
naive_proxy_acme_image: "docker.io/neilpang/acme.sh"
naive_proxy_acme_image_tag: "latest"

# -- ACME / TLS ---------------------------------------------------------------

# Email for Let's Encrypt notifications (optional but recommended).
naive_proxy_acme_email: ""
# Explicit ACME CA for acme.sh. Default to Let's Encrypt so first issue does not
# depend on ZeroSSL account registration semantics. In molecule mode this is
# overridden by the local Pebble directory.
naive_proxy_acme_server: "letsencrypt"

# -- Paths --------------------------------------------------------------------

naive_proxy_config_dir: /opt/naive-proxy

# -- Network ------------------------------------------------------------------

naive_proxy_listen_port: 443
# External port visible to clients (e.g. after port forwarding).
# Used in client configs. Defaults to listen_port.
naive_proxy_external_port: "{{ naive_proxy_listen_port }}"

# -- HAProxy tuning -----------------------------------------------------------
# Defaults below favor client throughput on a dedicated VPN edge. Override them
# downward on smaller hosts or when memory efficiency matters more than speed.

naive_proxy_haproxy_timeout_connect: "5s"
naive_proxy_haproxy_timeout_client: "60s"
naive_proxy_haproxy_timeout_server: "60s"
naive_proxy_haproxy_timeout_tunnel: "3600s"
naive_proxy_haproxy_timeout_client_fin: "30s"
naive_proxy_haproxy_timeout_server_fin: "30s"

# Optional global connection cap. 0 keeps HAProxy defaults.
naive_proxy_haproxy_global_maxconn: 0

# HAProxy 3.2+ CPU placement policy. Sets the `cpu-policy <name>` directive
# in the HAProxy `global` section, which decides how worker threads / thread
# groups are pinned to CPU resources at startup.
# Empty string keeps HAProxy's own default, which is `first-usable-node`
# since HAProxy 3.0 (binds to the first usable NUMA node).
#
# Accepted values (see HAProxy 3.2 manual `3.1. cpu-policy`):
#   none                  — no specific placement; threads run wherever the OS schedules them.
#   first-usable-node     — pin all threads to the first usable NUMA node (HAProxy default).
#   group-by-cluster      — one thread group per CPU cluster (typically per L3 cache).
#   group-by-2-clusters / group-by-3-clusters / group-by-4-clusters
#                         — like above, grouping N clusters together.
#   group-by-ccx          — one thread group per CCX (e.g. AMD core complex).
#   group-by-2-ccx / group-by-3-ccx / group-by-4-ccx
#                         — like above, grouping N CCX together.
#   group-by-node         — one thread group per NUMA node.
#   performance           — performance-oriented; spreads threads across cores to
#                           maximize throughput.
#   efficiency            — efficiency-oriented; consolidates threads on fewer cores.
#   resource              — minimal-resource; even more aggressive consolidation.
#
# `performance` is the recommended starting point for a busy dedicated VPN
# edge where client throughput matters more than packing the daemon onto as
# few CPUs as possible.
naive_proxy_haproxy_cpu_policy: "performance"

# SSL session cache size in blocks. HAProxy documents roughly 200 bytes per
# block, so 40000 blocks stay inexpensive while giving more room for session
# reuse bursts than the upstream default.
naive_proxy_haproxy_ssl_cache_size: 40000

# Per-stream H2 frontend receive buffer.
# Sets the `tune.h2.fe.rxbuf <size>` directive in the HAProxy `global`
# section. Units: HAProxy size syntax — bytes by default; suffixes
# `k`, `m`, `g` accepted (kibibytes / mebibytes / gibibytes, base 1024).
# Examples: `1638400`, `1600k`, `12500000`, `12500k`, `12m`.
# When empty, the directive is omitted from haproxy.cfg and HAProxy
# applies its own built-in default of `1600k` (1638400 bytes / 1.6 MiB,
# ≈ enough for ~130 Mbps × 100 ms RTT). Raise on high-BDP links —
# rough sizing: `BDP_bytes ≈ bandwidth_mbps × rtt_ms × 125`. RAM cost
# is per-stream × concurrent H2 streams.
#
# Empirical note: bumping rxbuf above default *worsened* the H2 demuxer
# backpressure failures we observed in real-internet load tests
# (haproxy/haproxy#3354). Leave at the default unless you have
# benchmarks proving otherwise.
naive_proxy_haproxy_h2_frontend_rxbuf: ""

# Per-stream H2 initial flow-control window (bytes). Sets the
# `tune.h2.fe.initial-window-size <size>` directive in the HAProxy
# `global` section. Default `1048576` (1 MiB) reduces WINDOW_UPDATE
# round-trips and the chance of buffer-pressure-induced demuxer
# misalignment we observed in real-internet load (haproxy/haproxy#3354).
# RFC default is 65535 (64 KiB) — set this to 0 to keep RFC default.
# Requires HAProxy 3.0+.
naive_proxy_haproxy_h2_initial_window_size: 1048576

# H2 maximum frame size HAProxy advertises to clients. Sets the
# `tune.h2.max-frame-size <size>` directive. Default `1048576` (1 MiB)
# reduces per-byte frame-header parsing overhead on the demuxer for
# CONNECT-tunnel and other long-DATA-payload H2 traffic. Set to 0 to
# keep HAProxy default (16 KiB). Values up to 16777215 (RFC max) are
# accepted but cause head-of-line blocking on multiplexed connections;
# 1 MiB is the sweet spot we validated.
# Requires HAProxy 3.0+.
naive_proxy_haproxy_h2_max_frame_size: 1048576

# Optional Linux-only low-water mark for client/server sockets. Set this to a
# small value such as 16384 only after benchmarks confirm it helps your host.
naive_proxy_haproxy_notsent_lowat: 0

# -- HAProxy diagnostics ------------------------------------------------------
# Opt-in. When enabled, the role exposes the HAProxy CLI admin socket on
# the host's loopback (127.0.0.1) and declares a wide H2 trace ring sink
# in `global`. This is what the helper scripts under `roles/naive_proxy/
# debug/` need to capture full H2 demuxer events from a running pod.
#
# Side-effects when enabling:
#   - `ring h2trace` is added to haproxy.cfg (32 MiB by default — see size below)
#   - `stats socket ipv4@*:<port> level admin` is added to the global section
#   - the pod publishes `127.0.0.1:<port>` → pod's `<port>` (NOT 0.0.0.0,
#     so the socket is unreachable from outside the host's loopback)
#   - toggling this var requires the *pod* to be recreated, not just the
#     haproxy container — adding/removing a published port is a
#     pod-level change. The role's handlers do this automatically.
#
# Default off. Turn on only when actively debugging.

naive_proxy_haproxy_diagnostics_enabled: false

# Host-side loopback port that exposes the HAProxy admin socket and the
# trace sink. Reachable as 127.0.0.1:<port> from the host only. Pick
# anything free.
naive_proxy_haproxy_diagnostics_port: 19999

# H2 trace ring sink size in bytes. The default 128 MiB keeps a full
# 5-minute capture without rolling over even under heavy multi-stream
# load AT `verbosity complete` (where every event carries the full
# frame hex-dump and the ring fills ~10x faster than at `advanced`).
# Reduce on RAM-constrained hosts; 32 MiB is fine if you only ever run
# the trace at `verbosity advanced` (the default in `h2trace-start.sh`).
naive_proxy_haproxy_diagnostics_ring_size: 134217728

# -- Container options --------------------------------------------------------

naive_proxy_read_only_rootfs: true
# Add :Z SELinux relabel to volume mounts
naive_proxy_selinux_relabel: false

# -- Extra options for naive backend container ---------------------------------
# `*_extra_env` / `*_extra_volumes` / `*_extra_args` are passed to
# `podman container run` *before* the image (i.e. they are podman-level
# flags). To pass flags to the `naive` binary itself (chromium net stack
# CLI: `--v=N`, `--vmodule=...`, `--log-net-log=...`, `--insecure-tls=`,
# etc.) use `naive_proxy_backend_naive_args` below — those are appended
# after the image, so podman treats them as ENTRYPOINT arguments.

naive_proxy_backend_extra_env: {}
naive_proxy_backend_extra_volumes: []
naive_proxy_backend_extra_args: []

# Extra CLI flags forwarded to the `naive` binary entrypoint. Useful for
# tuning chromium net-stack verbosity without rebuilding the backend
# image. Example: `["--v=1"]` enables VLOG(1) across all modules;
# `["--vmodule=naive_proxy*=2"]` limits verbose logging to naive_proxy
# source files only (less noisy than `--v=2`).
naive_proxy_backend_naive_args: []

# -- Decoy site ---------------------------------------------------------------
# Caddy serves a static decoy page for unauthenticated visitors.
# Path to custom index.html. When empty, the role uses its built-in stub page.
# Ignored when naive_proxy_decoy_upstream_url is set.

naive_proxy_decoy_index_html: ""

# When non-empty, Caddy reverse-proxies all unauthenticated traffic to the
# given URL (e.g. "https://example.com") instead of serving the local static
# page. Caddy terminates HTTPS on the upstream side and rewrites the Host
# header so the upstream sees its own hostname. Absolute URLs and Location
# redirects from the upstream are NOT rewritten — see README "Limitations".
# When set, naive_proxy_decoy_index_html is ignored.

naive_proxy_decoy_upstream_url: ""

# -- Client configs -----------------------------------------------------------

naive_proxy_client_config_dir: "{{ playbook_dir }}/naive-proxy-json-configs"

# -- Molecule testing mode ----------------------------------------------------
# Deploys pebble (test ACME CA) as an additional container in the pod.
# Sets acme_server and acme_insecure automatically. Never enable in production.

naive_proxy_molecule_mode: false
