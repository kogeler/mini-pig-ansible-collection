# -- General ------------------------------------------------------------------

naive_proxy_enabled: true

# Force-pull fresh runtime images for long-running services near the start of
# the role. Intended for already provisioned hosts. When enabled, only HAProxy
# and decoy images are refreshed. ACME and molecule-only Pebble are
# intentionally excluded.
naive_proxy_update_runtime_images: false

# -- Domain (required) --------------------------------------------------------
# Server FQDN. Used for TLS certificate and HAProxy site address.

naive_proxy_domain: ""

# Servers offered to clients, as `<name>: <ip>` maps where the KEY is a
# human-readable server name and the value is the connect address. The role
# renders TWO sing-box client configs per user, each drawing its server set
# from its OWN map (each required, at least one entry — preflight validates):
#
#   naive_proxy_external_ip_auto    -> automatic config (`urltest` selector),
#                                      file singbox-<host>-<user>-auto.json
#   naive_proxy_external_ip_manual  -> manual config (`selector`),
#                                      file singbox-<host>-<user>-manual.json
#
# Set both to the same map for identical server sets, or differ them per mode.
#
# For every entry the client config gets a `<name> - Naive` option and, when
# AnyTLS is enabled, a `<name> - AnyTLS` option — both with the entry's IP in
# the outbound `server` field (so the client never bootstrap-resolves the proxy
# host) and the domain as TLS SNI via `tls.server_name`. Option display names
# come from the map key, never the IP. The role does not bind to these
# addresses — they are only rendered into the generated client configs.
#
# Example:
#   naive_proxy_external_ip_auto:
#     helsinki: "203.0.113.10"
#     stockholm: "203.0.113.20"
#   naive_proxy_external_ip_manual:
#     helsinki: "203.0.113.10"

naive_proxy_external_ip_auto: {}
naive_proxy_external_ip_manual: {}

# -- Users (required) ---------------------------------------------------------
# Dict of name -> password.  At least one user must be defined.
# Passwords are used for HTTP basic auth (Proxy-Authorization header).
# Users are configured in BOTH HAProxy (userlist) and naive backend (--listen).

naive_proxy_users: {}

# -- Naive backend ------------------------------------------------------------
# Official standalone naive binary from klzgrad/naiveproxy releases.
# Releases: https://github.com/klzgrad/naiveproxy/releases

naive_proxy_naive_version: "v148.0.7778.96-5"
naive_proxy_padding: true
# Base image for the naive backend container build.
naive_proxy_backend_base_image: "docker.io/library/ubuntu"
naive_proxy_backend_base_image_tag: "22.04"

# -- Images -------------------------------------------------------------------

# Pinned to the explicit minor `3.3.10-alpine` (NOT the rolling
# `3.3-alpine`) because `v3.3.10` is the first 3.3.x release that
# carries the upstream fix for the H2 PADDED-DATA padding-drain bug
# we hit in production (haproxy#3354). The official Docker Hub
# library/haproxy image leaves OCI image labels empty
# (`org.opencontainers.image.version` etc. are not set), so the only
# way to pin to a known-good build is the explicit minor tag — the
# image's `HAPROXY_VERSION=3.3.10` ENV and `haproxy -v` banner
# ("HAProxy version 3.3.10-0a72d7f9f 2026/05/11") confirm the build.
#
# DO NOT drop this pin below `3.3.10`. Branches that still carry the
# bug: 3.3.9 and earlier on the 3.3 line, plus the entire 3.2 / 3.0 /
# 2.8 maintenance lines (the fix has not been backported there yet).
# 3.3 also happens to be the first stable branch that ships the
# `ring` infrastructure the optional diagnostics toggle below uses.
#
# Bumping the pin UPWARDS to a newer 3.3.x (3.3.11 once it ships, …)
# is the expected maintenance path. Before bumping, pull the new
# tag and verify `haproxy -v` reports a build dated after the
# `043db34` backport (2026-05-07) — every 3.3.10+ build qualifies.
#
#   - issue:        https://github.com/haproxy/haproxy/issues/3354
#   - upstream fix: https://github.com/haproxy/haproxy/commit/faf3e9ac3a5df7258b0abbc06b0e0378617a18e5
#                   ("BUG/MEDIUM: mux-h2: Properly consume padding for DATA frames")
#   - 3.3 backport: https://git.haproxy.org/?p=haproxy-3.3.git;a=commit;h=043db34df5b08f32055e1ebf1dd568473b268dbe
#   - 3.3 tags:     https://git.haproxy.org/?p=haproxy-3.3.git;a=tags
#   - local notes:  temp/haproxy-3354-evidence/AGENT-REPORT-verbosity-complete-rerun.md
naive_proxy_haproxy_image: "docker.io/library/haproxy"
naive_proxy_haproxy_image_tag: "3.3.10-alpine"
naive_proxy_decoy_image: "docker.io/library/caddy"
naive_proxy_decoy_image_tag: "latest"
naive_proxy_acme_image: "docker.io/neilpang/acme.sh"
naive_proxy_acme_image_tag: "latest"

# sing-box image for the AnyTLS server container. The official image is
# Alpine-based (`FROM alpine`) and built with `with_acme` plus core AnyTLS,
# so it supports both the AnyTLS inbound and built-in Let's Encrypt. Pinned
# to an explicit stable tag (NOT `latest`) for reproducibility — bumping to a
# newer stable sing-box release is the expected maintenance path.
naive_proxy_singbox_image: "ghcr.io/sagernet/sing-box"
naive_proxy_singbox_image_tag: "v1.13.13"

# -- ACME / TLS ---------------------------------------------------------------

# Email for Let's Encrypt notifications (optional but recommended).
naive_proxy_acme_email: ""
# Explicit ACME CA for acme.sh. Default to Let's Encrypt so first issue does not
# depend on ZeroSSL account registration semantics. In molecule mode this is
# overridden by the local Pebble directory.
naive_proxy_acme_server: "letsencrypt"

# -- AnyTLS (sing-box) --------------------------------------------------------
# A second proxy server deployed next to the naive backend: a sing-box AnyTLS
# inbound in the SAME pod, behind the SAME HAProxy, reached on the public
# listen port by a SEPARATE domain via SNI. sing-box terminates TLS itself
# and obtains/renews its OWN Let's Encrypt certificate (built-in CertMagic
# ACME, TLS-ALPN-01). HAProxy passes the AnyTLS SNI straight through (TCP)
# and routes the two domains' ACME challenges to their respective owners by
# SNI. Enabled by default, like the naive backend.

naive_proxy_anytls_enabled: true

# AnyTLS server FQDN (required when enabled). MUST differ from
# naive_proxy_domain and resolve to the SAME public IP(s) — the AnyTLS server
# sits behind the same HAProxy on the same addresses, only the SNI differs.
naive_proxy_anytls_domain: ""

# AnyTLS authentication reuses naive_proxy_users (name -> password); the
# password doubles as the AnyTLS shared secret. No separate user map — both
# protocols share the same server set and the same credentials.

# sing-box log level for the AnyTLS server: debug / info / warn / error.
naive_proxy_anytls_log_level: "info"

# Certificate strategy for the AnyTLS server.
#   true  (default) -> sing-box obtains/renews its own certificate via ACME.
#   false            -> sing-box uses a static certificate from
#                       `<config_dir>/anytls-certs/{fullchain,key}.pem`.
# In molecule_mode the role forces the static path (and generates a
# self-signed cert) so tests never depend on public Let's Encrypt issuance;
# the working ACME config is still rendered and validated separately.
naive_proxy_anytls_acme_enabled: true
# ACME CA provider for the AnyTLS certificate: letsencrypt / zerossl / a
# custom ACME directory URL (mirrors naive_proxy_acme_server semantics).
# In molecule_mode the role overrides this with the local Pebble directory.
naive_proxy_anytls_acme_provider: "letsencrypt"
# ACME account email for the AnyTLS certificate. Defaults to the naive one.
naive_proxy_anytls_acme_email: "{{ naive_proxy_acme_email }}"

# uTLS fingerprint for the AnyTLS *client* outbound (TLS ClientHello mimicry).
# When non-empty, every `<name> - AnyTLS` outbound in the generated sing-box
# client configs gains a `tls.utls { enabled: true, fingerprint: <value> }`
# block, so the client's TLS handshake imitates the chosen browser instead of
# sing-box's default Go hello. The empty string (default) omits the block and
# uTLS stays disabled. Valid fingerprints (sing-box uTLS): chrome, firefox,
# edge, safari, 360, qq, ios, android, random, randomized (preflight rejects
# anything else).
#
# Enabling this ALSO makes the AnyTLS server advertise the matching ALPN
# (h2,http/1.1) automatically — see `_naive_proxy_anytls_alpn` in vars/main.yml.
# This is required: a browser uTLS ClientHello always offers h2,http/1.1, and
# the server's ACME path otherwise advertises only acme-tls/1, which would abort
# every session with `no_application_protocol`. The coupling is internal, so
# turning uTLS on is the only knob you touch.
naive_proxy_anytls_utls_fingerprint: ""

# Test-only: when true AND molecule_mode, the AnyTLS server issues its
# certificate from the local Pebble test CA via real ACME (instead of the
# static self-signed cert), exercising the HAProxy TLS-ALPN-01 routing to
# sing-box end to end. Off by default; the anytls-stress scenario turns it on.
naive_proxy_anytls_acme_in_molecule: false
# CA certificate (host path) the sing-box container must trust for the ACME
# directory's TLS. sing-box has no `--insecure` equivalent, so Pebble (whose
# directory uses a self-signed cert) needs its CA mounted and exported via
# SSL_CERT_FILE. Empty = use the system trust store (production Let's Encrypt).
naive_proxy_anytls_acme_directory_ca: ""

# -- Paths --------------------------------------------------------------------

naive_proxy_config_dir: /opt/naive-proxy

# -- Network ------------------------------------------------------------------

naive_proxy_listen_port: 443
# External port visible to clients (e.g. after port forwarding).
# Used in client configs. Defaults to listen_port.
naive_proxy_external_port: "{{ naive_proxy_listen_port }}"

# -- HAProxy tuning -----------------------------------------------------------
# Defaults below favor client throughput on a dedicated VPN edge. Override them
# downward on smaller hosts or when memory efficiency matters more than speed.

naive_proxy_haproxy_timeout_connect: "5s"
naive_proxy_haproxy_timeout_client: "60s"
naive_proxy_haproxy_timeout_server: "60s"
naive_proxy_haproxy_timeout_tunnel: "3600s"
naive_proxy_haproxy_timeout_client_fin: "30s"
naive_proxy_haproxy_timeout_server_fin: "30s"

# Optional global connection cap. 0 keeps HAProxy defaults.
naive_proxy_haproxy_global_maxconn: 0

# HAProxy 3.2+ CPU placement policy. Sets the `cpu-policy <name>` directive
# in the HAProxy `global` section, which decides how worker threads / thread
# groups are pinned to CPU resources at startup.
# Empty string keeps HAProxy's own default, which is `first-usable-node`
# since HAProxy 3.0 (binds to the first usable NUMA node).
#
# Accepted values (see HAProxy 3.2 manual `3.1. cpu-policy`):
#   none                  — no specific placement; threads run wherever the OS schedules them.
#   first-usable-node     — pin all threads to the first usable NUMA node (HAProxy default).
#   group-by-cluster      — one thread group per CPU cluster (typically per L3 cache).
#   group-by-2-clusters / group-by-3-clusters / group-by-4-clusters
#                         — like above, grouping N clusters together.
#   group-by-ccx          — one thread group per CCX (e.g. AMD core complex).
#   group-by-2-ccx / group-by-3-ccx / group-by-4-ccx
#                         — like above, grouping N CCX together.
#   group-by-node         — one thread group per NUMA node.
#   performance           — performance-oriented; spreads threads across cores to
#                           maximize throughput.
#   efficiency            — efficiency-oriented; consolidates threads on fewer cores.
#   resource              — minimal-resource; even more aggressive consolidation.
#
# `performance` is the recommended starting point for a busy dedicated VPN
# edge where client throughput matters more than packing the daemon onto as
# few CPUs as possible.
naive_proxy_haproxy_cpu_policy: "performance"

# SSL session cache size in blocks. HAProxy documents roughly 200 bytes per
# block, so 40000 blocks stay inexpensive while giving more room for session
# reuse bursts than the upstream default.
naive_proxy_haproxy_ssl_cache_size: 40000

# Per-stream H2 frontend receive buffer.
# Sets the `tune.h2.fe.rxbuf <size>` directive in the HAProxy `global`
# section. Units: HAProxy size syntax — bytes by default; suffixes
# `k`, `m`, `g` accepted (kibibytes / mebibytes / gibibytes, base 1024).
# Examples: `1638400`, `1600k`, `12500000`, `12500k`, `12m`.
# When empty, the directive is omitted from haproxy.cfg and HAProxy
# applies its own built-in default of `1600k` (1638400 bytes / 1.6 MiB,
# ≈ enough for ~130 Mbps × 100 ms RTT). Raise on high-BDP links —
# rough sizing: `BDP_bytes ≈ bandwidth_mbps × rtt_ms × 125`. RAM cost
# is per-stream × concurrent H2 streams.

naive_proxy_haproxy_h2_frontend_rxbuf: "6m"

# Per-stream H2 initial flow-control window (bytes). Sets the
# `tune.h2.fe.initial-window-size <size>` directive in the HAProxy
# `global` section. Default `1048576` (1 MiB) cuts WINDOW_UPDATE
# round-trips on long-lived bidirectional streams — a pure throughput
# tuning on high-BDP links, sized to match `h2_frontend_rxbuf` above.
# RFC default is 65535 (64 KiB) — set this to 0 to keep RFC default.
# Requires HAProxy 3.0+.
#
# Historical note: this knob was originally introduced as a mitigation
# for haproxy/haproxy#3354 (PADDED-DATA misalignment) — a larger window
# reduced how often the failure surfaced. The actual bug is fixed
# upstream by `faf3e9a` (3.3 maintenance backport `043db34`); on a
# build that includes the fix this value is purely a throughput knob.
naive_proxy_haproxy_h2_initial_window_size: 1048576

# H2 maximum frame size HAProxy advertises to clients. Sets the
# `tune.h2.max-frame-size <size>` directive. `0` keeps HAProxy default
# (16 KiB). Values up to 16777215 (RFC max) are accepted but cause
# head-of-line blocking on multiplexed connections.
#
# Historical note: previously defaulted to `1048576` (1 MiB) as a
# secondary mitigation for haproxy/haproxy#3354 — fewer frames per
# byte of payload reduced the rate at which PADDED+END_STREAM markers
# triggered the demuxer misalignment. The bug is fixed upstream by
# `faf3e9a` (3.3 maintenance backport `043db34`), so the mitigation
# justification is gone. Re-raise only with a benchmark proving a real
# parsing-overhead win on your workload.
# Requires HAProxy 3.0+.
naive_proxy_haproxy_h2_max_frame_size: 0

# Optional Linux-only low-water mark for client/server sockets. Set this to a
# small value such as 16384 only after benchmarks confirm it helps your host.
naive_proxy_haproxy_notsent_lowat: 0

# -- HAProxy diagnostics ------------------------------------------------------
# Opt-in. When enabled, the role exposes the HAProxy CLI admin socket on
# the host's loopback (127.0.0.1) and declares a wide H2 trace ring sink
# in `global`. This is what the helper scripts under `roles/naive_proxy/
# debug/` need to capture full H2 demuxer events from a running pod.
#
# Side-effects when enabling:
#   - `ring h2trace` is added to haproxy.cfg (32 MiB by default — see size below)
#   - `stats socket ipv4@*:<port> level admin` is added to the global section
#   - the pod publishes `127.0.0.1:<port>` → pod's `<port>` (NOT 0.0.0.0,
#     so the socket is unreachable from outside the host's loopback)
#   - toggling this var requires the *pod* to be recreated, not just the
#     haproxy container — adding/removing a published port is a
#     pod-level change. The role's handlers do this automatically.
#
# Default off. Turn on only when actively debugging.

naive_proxy_haproxy_diagnostics_enabled: false

# Host-side loopback port that exposes the HAProxy admin socket and the
# trace sink. Reachable as 127.0.0.1:<port> from the host only. Pick
# anything free.
naive_proxy_haproxy_diagnostics_port: 19999

# H2 trace ring sink size in bytes. The default 128 MiB keeps a full
# 5-minute capture without rolling over even under heavy multi-stream
# load AT `verbosity complete` (where every event carries the full
# frame hex-dump and the ring fills ~10x faster than at `advanced`).
# Reduce on RAM-constrained hosts; 32 MiB is fine if you only ever run
# the trace at `verbosity advanced` (the default in `h2trace-start.sh`).
naive_proxy_haproxy_diagnostics_ring_size: 134217728

# -- Container options --------------------------------------------------------

naive_proxy_read_only_rootfs: true
# Add :Z SELinux relabel to volume mounts
naive_proxy_selinux_relabel: false

# -- Extra options for naive backend container ---------------------------------
# `*_extra_env` / `*_extra_volumes` / `*_extra_args` are passed to
# `podman container run` *before* the image (i.e. they are podman-level
# flags). To pass flags to the `naive` binary itself (chromium net stack
# CLI: `--v=N`, `--vmodule=...`, `--log-net-log=...`, `--insecure-tls=`,
# etc.) use `naive_proxy_backend_naive_args` below — those are appended
# after the image, so podman treats them as ENTRYPOINT arguments.

naive_proxy_backend_extra_env: {}
naive_proxy_backend_extra_volumes: []
naive_proxy_backend_extra_args: []

# Extra CLI flags forwarded to the `naive` binary entrypoint. Useful for
# tuning chromium net-stack verbosity without rebuilding the backend
# image. Example: `["--v=1"]` enables VLOG(1) across all modules;
# `["--vmodule=naive_proxy*=2"]` limits verbose logging to naive_proxy
# source files only (less noisy than `--v=2`).
naive_proxy_backend_naive_args: []

# -- Decoy site ---------------------------------------------------------------
# Caddy serves a static decoy page for unauthenticated visitors.
# Path to custom index.html. When empty, the role uses its built-in stub page.
# Ignored when naive_proxy_decoy_upstream_url is set.

naive_proxy_decoy_index_html: ""

# When non-empty, Caddy reverse-proxies all unauthenticated traffic to the
# given URL (e.g. "https://example.com") instead of serving the local static
# page. Caddy terminates HTTPS on the upstream side and rewrites the Host
# header so the upstream sees its own hostname. Absolute URLs and Location
# redirects from the upstream are NOT rewritten — see README "Limitations".
# When set, naive_proxy_decoy_index_html is ignored.

naive_proxy_decoy_upstream_url: ""

# -- Client configs -----------------------------------------------------------

naive_proxy_client_config_dir: "{{ playbook_dir }}/naive-proxy-json-configs"

# Sing-box `urltest` knobs — used ONLY by the automatic client config
# (singbox-<host>-<user>-auto.json), whose top `proxy` outbound is a
# `urltest` that periodically probes the URL below through every option
# and picks the lowest-latency one. The manual config uses a `selector`
# instead and ignores these. DNS detour + route default target `proxy`.
#
# Default URL is the sing-box / shadowsocks-rust convention — Google's
# generate_204 endpoint that returns an empty 204 (small payload, very
# stable, anycast). Override to a self-hosted endpoint if your clients
# operate in environments where reaching Google directly is undesired.
naive_proxy_singbox_urltest_url: "https://www.gstatic.com/generate_204"
# Sing-box duration syntax (`30s`, `3m`, `1h`). Lower = faster failover
# but more probe traffic per outbound.
naive_proxy_singbox_urltest_interval: "3m"

# For every generated sing-box client config the role also writes a PNG QR code
# with the config embedded, next to the JSON (same name, `.png`) — handy for
# importing a profile by scanning instead of copying a file. The QR encodes the
# MINIFIED config (the pretty-printed JSON never fits a single symbol).
#
# Requires the `qrcode` Python library with Pillow on the CONTROLLER, installed
# for the SAME Python that runs Ansible (configs are written there via
# delegate_to: localhost). From a virtualenv: `pip install "qrcode[pil]"` — the
# system `apt install python3-qrcode python3-pil` packages are not visible inside
# a venv; use apt only under the system Python.
#
# Capacity: a single QR holds ~2953 bytes at error-correction L. With AnyTLS on
# each server is two outbounds, so a config fits up to ~4 servers; beyond that
# the module fails loudly rather than emitting an unscannable code — split the
# server set or generate fewer servers per file.
naive_proxy_client_qr_enabled: false
# QR error-correction level: L/M/Q/H. L holds the most data (~2953 bytes) and is
# the right default for these configs; raise it for more damage resistance at the
# cost of capacity (Q ~1663 bytes, H ~1273 bytes).
naive_proxy_client_qr_error_correction: "L"
# Pixels per QR module and quiet-zone width (in modules; QR spec minimum is 4).
naive_proxy_client_qr_box_size: 8
naive_proxy_client_qr_border: 4

# -- Molecule testing mode ----------------------------------------------------
# Deploys pebble (test ACME CA) as an additional container in the pod.
# Sets acme_server and acme_insecure automatically. Never enable in production.

naive_proxy_molecule_mode: false
