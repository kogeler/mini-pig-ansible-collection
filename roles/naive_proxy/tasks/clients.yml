# The role renders TWO sing-box client configs per user, each from its OWN
# server map:
#
#   * singbox-<host>-<user>-auto.json    — automatic selection (`urltest`),
#     servers from `naive_proxy_external_ip_auto`
#   * singbox-<host>-<user>-manual.json  — manual selection (`selector`),
#     servers from `naive_proxy_external_ip_manual`
#
# Each map is `<name>: <ip>` where the key is a human-readable server name.
# Inside a file every server becomes up to two options — `<name> - Naive`
# and (when naive_proxy_anytls_enabled) `<name> - AnyTLS` — so a file holds
# `2 × len(<its map>)` options, all reaching the mapped IP and told apart by
# SNI. Option names come from the map key, never the IP.

- name: naive-proxy | clients | server / option summary
  ansible.builtin.debug:
    msg: >-
      [{{ item.0.key }}] {{ item.1 }} config: servers
      [{{ ({'auto': naive_proxy_external_ip_auto,
            'manual': naive_proxy_external_ip_manual}[item.1])
          | dict2items | map(attribute='key') | join(', ') }}]
      -> options "<name> - Naive"{{ naive_proxy_anytls_enabled
         | ternary(' + "<name> - AnyTLS"', ' (AnyTLS disabled)') }}
  loop: "{{ (naive_proxy_users | dict2items)
            | product(['auto', 'manual'])
            | list }}"
  loop_control:
    label: "{{ item.0.key }}-{{ item.1 }}"

- name: naive-proxy | clients | create client config directory
  ansible.builtin.file:
    path: "{{ naive_proxy_client_config_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  connection: local
  become: false
  run_once: true

- name: naive-proxy | clients | write sing-box client configs (auto + manual)
  ansible.builtin.template:
    src: singbox-client.json.j2
    dest: "{{ naive_proxy_client_config_dir }}/singbox-{{ inventory_hostname }}-{{ item.0.key }}-{{ item.1 }}.json"
    mode: "0600"
  vars:
    _naive_proxy_singbox_user: "{{ item.0.key }}"
    _naive_proxy_singbox_pass: "{{ item.0.value }}"
    _naive_proxy_singbox_mode: "{{ item.1 }}"
    _naive_proxy_singbox_ip_map: >-
      {{ {'auto': naive_proxy_external_ip_auto,
          'manual': naive_proxy_external_ip_manual}[item.1] }}
  delegate_to: localhost
  connection: local
  become: false
  loop: "{{ (naive_proxy_users | dict2items)
            | product(['auto', 'manual'])
            | list }}"
  loop_control:
    label: "{{ item.0.key }}-{{ item.1 }}"

- name: naive-proxy | clients | render client config QR codes (PNG)
  kogeler.mini_pig.qr_code:
    src: "{{ naive_proxy_client_config_dir }}/singbox-{{ inventory_hostname }}-{{ item.0.key }}-{{ item.1 }}.json"
    dest: "{{ naive_proxy_client_config_dir }}/singbox-{{ inventory_hostname }}-{{ item.0.key }}-{{ item.1 }}.png"
    # Encode the compact config — the pretty-printed JSON never fits a single
    # symbol. The module fails loudly if even the minified form overflows.
    minify_json: true
    error_correction: "{{ naive_proxy_client_qr_error_correction }}"
    box_size: "{{ naive_proxy_client_qr_box_size | int }}"
    border: "{{ naive_proxy_client_qr_border | int }}"
    mode: "0600"
  delegate_to: localhost
  connection: local
  become: false
  when: naive_proxy_client_qr_enabled | bool
  loop: "{{ (naive_proxy_users | dict2items)
            | product(['auto', 'manual'])
            | list }}"
  loop_control:
    label: "{{ item.0.key }}-{{ item.1 }}"

- name: naive-proxy | clients | display client config paths
  ansible.builtin.debug:
    msg: >-
      [{{ item.0.key }}] {{ item.1 }}:
      {{ naive_proxy_client_config_dir }}/singbox-{{ inventory_hostname }}-{{ item.0.key }}-{{ item.1 }}.json{{
      naive_proxy_client_qr_enabled | bool
      | ternary(' (+ .png QR)', '') }}
  loop: "{{ (naive_proxy_users | dict2items)
            | product(['auto', 'manual'])
            | list }}"
  loop_control:
    label: "{{ item.0.key }}-{{ item.1 }}"
