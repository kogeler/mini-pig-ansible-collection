# -- Pod -----------------------------------------------------------------------

_naive_proxy_pod_name: naive-pod
_naive_proxy_pod_unit: "podman-{{ _naive_proxy_pod_name }}.service"

# -- HAProxy container ---------------------------------------------------------

_naive_proxy_haproxy_name: naive-haproxy
_naive_proxy_haproxy_unit: "podman-{{ _naive_proxy_haproxy_name }}.service"
_naive_proxy_haproxy_https_port: 8444

# -- Naive backend container ---------------------------------------------------

_naive_proxy_backend_name: naive-backend
_naive_proxy_backend_unit: "podman-{{ _naive_proxy_backend_name }}.service"
_naive_proxy_backend_image: "localhost/naive-backend"
_naive_proxy_backend_image_tag: "{{ naive_proxy_naive_version }}"
_naive_proxy_backend_port: 8080

# -- Decoy container -----------------------------------------------------------

_naive_proxy_decoy_name: naive-decoy
_naive_proxy_decoy_unit: "podman-{{ _naive_proxy_decoy_name }}.service"
_naive_proxy_decoy_port: 8081

# -- ACME ----------------------------------------------------------------------

_naive_proxy_acme_alpn_port: 10443
_naive_proxy_acme_renew_unit: "naive-acme-renew.service"
_naive_proxy_acme_renew_timer: "naive-acme-renew.timer"

# -- Pebble (molecule mode only) -----------------------------------------------

_naive_proxy_pebble_name: naive-pebble
_naive_proxy_pebble_unit: "podman-{{ _naive_proxy_pebble_name }}.service"
_naive_proxy_pebble_image: "ghcr.io/letsencrypt/pebble"
_naive_proxy_pebble_image_tag: "latest"
_naive_proxy_pebble_port: 14000
_naive_proxy_pebble_mgmt_port: 15000
_naive_proxy_pebble_acme_server: "https://127.0.0.1:{{ _naive_proxy_pebble_port }}/dir"

# -- Paths ---------------------------------------------------------------------

_naive_proxy_build_dir: "{{ naive_proxy_config_dir }}/build"
_naive_proxy_certs_dir: "{{ naive_proxy_config_dir }}/certs"
_naive_proxy_acme_data_dir: "{{ naive_proxy_config_dir }}/acme-data"
_naive_proxy_decoy_html_dir: "{{ naive_proxy_config_dir }}/decoy-html"
_naive_proxy_decoy_data_dir: "{{ naive_proxy_config_dir }}/caddy-data"

# -- Derived tuning values -----------------------------------------------------
# BDP-based auto-sizing for the frontend H2 receive buffer. HAProxy documents
# the default 1600k as roughly enough for 130 Mbps over 100 ms RTT, so we use
# the same bandwidth-delay product with a floor at the upstream default.

_naive_proxy_haproxy_h2_frontend_rxbuf_auto: >-
  {% set bandwidth = naive_proxy_haproxy_expected_bandwidth_mbps | float %}
  {% set rtt_ms = naive_proxy_haproxy_expected_rtt_ms | float %}
  {% if bandwidth > 0 and rtt_ms > 0 %}
  {{ [1638400, (bandwidth * rtt_ms * 125) | round(0, 'ceil') | int] | max }}
  {% else %}
  {{ "" }}
  {% endif %}

_naive_proxy_haproxy_h2_frontend_rxbuf_effective: >-
  {{ naive_proxy_haproxy_h2_frontend_rxbuf | default('', true)
     or _naive_proxy_haproxy_h2_frontend_rxbuf_auto }}
