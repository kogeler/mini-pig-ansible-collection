# -- Pod -----------------------------------------------------------------------

_naive_proxy_pod_name: naive-pod
_naive_proxy_pod_unit: "podman-{{ _naive_proxy_pod_name }}.service"

# -- HAProxy container ---------------------------------------------------------

_naive_proxy_haproxy_name: naive-haproxy
_naive_proxy_haproxy_unit: "podman-{{ _naive_proxy_haproxy_name }}.service"
_naive_proxy_haproxy_https_port: 8444

# -- Naive backend container ---------------------------------------------------

_naive_proxy_backend_name: naive-backend
_naive_proxy_backend_unit: "podman-{{ _naive_proxy_backend_name }}.service"
_naive_proxy_backend_image: "localhost/naive-backend"
_naive_proxy_backend_image_tag: "{{ naive_proxy_naive_version }}"
_naive_proxy_backend_port: 8080

# -- Decoy container -----------------------------------------------------------

_naive_proxy_decoy_name: naive-decoy
_naive_proxy_decoy_unit: "podman-{{ _naive_proxy_decoy_name }}.service"
_naive_proxy_decoy_port: 8081

# -- AnyTLS container (sing-box) -----------------------------------------------

_naive_proxy_anytls_name: naive-anytls
_naive_proxy_anytls_unit: "podman-{{ _naive_proxy_anytls_name }}.service"
# Internal listener port HAProxy forwards the AnyTLS SNI to (TCP passthrough).
_naive_proxy_anytls_port: 8445
# True when the server should run its own ACME. Production: on. In
# molecule_mode it is off (static self-signed cert) UNLESS
# naive_proxy_anytls_acme_in_molecule is set, in which case the server issues
# from the local Pebble test CA so the TLS-ALPN-01 routing is exercised.
_naive_proxy_anytls_acme: >-
  {{ (naive_proxy_anytls_acme_enabled | bool)
     and (not (naive_proxy_molecule_mode | bool)
          or (naive_proxy_anytls_acme_in_molecule | bool)) }}

# ALPN the AnyTLS server advertises (rendered into anytls.json `tls.alpn`).
# DERIVED, not operator-facing: there is no valid reason to set it by hand, and
# a wrong value would silently break uTLS clients. A browser uTLS ClientHello
# always offers ["h2","http/1.1"]; the server's ACME path (TLS-ALPN-01) would
# otherwise advertise only "acme-tls/1" → no overlap → every session aborts with
# `no_application_protocol`. So when uTLS is enabled we advertise h2,http/1.1
# (sing-box prepends it ahead of acme-tls/1, so ACME issuance keeps working);
# when uTLS is off we advertise nothing and the server behaves exactly as
# before (a client offering no ALPN always negotiates fine). The whole
# relationship is keyed off the single operator knob naive_proxy_anytls_utls_fingerprint.
_naive_proxy_anytls_alpn: "{{ ['h2', 'http/1.1'] if (naive_proxy_anytls_utls_fingerprint | length > 0) else [] }}"

# Accepted sing-box uTLS fingerprints for naive_proxy_anytls_utls_fingerprint.
# Mirrors the keys sing-box accepts (common/tls/utls_client.go); preflight uses
# this list to reject typos. Empty string (the default) disables uTLS entirely.
_naive_proxy_anytls_utls_fingerprints:
  - chrome
  - firefox
  - edge
  - safari
  - "360"
  - qq
  - ios
  - android
  - random
  - randomized

# -- ACME ----------------------------------------------------------------------

_naive_proxy_acme_alpn_port: 10443
_naive_proxy_acme_renew_unit: "naive-acme-renew.service"
_naive_proxy_acme_renew_timer: "naive-acme-renew.timer"

# -- Pebble (molecule mode only) -----------------------------------------------

_naive_proxy_pebble_name: naive-pebble
_naive_proxy_pebble_unit: "podman-{{ _naive_proxy_pebble_name }}.service"
_naive_proxy_pebble_image: "ghcr.io/letsencrypt/pebble"
_naive_proxy_pebble_image_tag: "latest"
_naive_proxy_pebble_port: 14000
_naive_proxy_pebble_mgmt_port: 15000
_naive_proxy_pebble_acme_server: "https://127.0.0.1:{{ _naive_proxy_pebble_port }}/dir"

# -- Paths ---------------------------------------------------------------------

_naive_proxy_build_dir: "{{ naive_proxy_config_dir }}/build"
_naive_proxy_certs_dir: "{{ naive_proxy_config_dir }}/certs"
_naive_proxy_acme_data_dir: "{{ naive_proxy_config_dir }}/acme-data"
_naive_proxy_decoy_html_dir: "{{ naive_proxy_config_dir }}/decoy-html"
_naive_proxy_decoy_data_dir: "{{ naive_proxy_config_dir }}/caddy-data"
# AnyTLS: persistent CertMagic storage (ACME mode) and static cert dir.
_naive_proxy_anytls_acme_data_dir: "{{ naive_proxy_config_dir }}/anytls-acme-data"
_naive_proxy_anytls_certs_dir: "{{ naive_proxy_config_dir }}/anytls-certs"
