---
name: Molecule

on:
  pull_request:
    branches:
      - main

jobs:
  detect:
    name: Detect changed roles and scenarios
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_jobs: ${{ steps.build-matrix.outputs.has_jobs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build matrix
        id: build-matrix
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          echo "Comparing ${BASE}..${HEAD}"

          CHANGED_FILES=$(git diff --name-only "${BASE}" "${HEAD}")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Collection-wide changes that can affect every role's test outcome
          # (dependency resolution, CI workflow itself, lint config, shared
          # plugins / runtime redirects). When any of these change we run
          # every ENABLE_CI scenario across all roles, not just the ones
          # whose role files changed.
          GLOBAL_PATTERN='^(galaxy\.yml|\.github/workflows/molecule\.yml|\.ansible-lint|plugins/|meta/runtime\.yml|requirements\.yml)'
          if echo "$CHANGED_FILES" | grep -qE "$GLOBAL_PATTERN"; then
            GLOBAL_CHANGE="true"
            echo "Global change detected — will run every ENABLE_CI scenario:"
            echo "$CHANGED_FILES" | grep -E "$GLOBAL_PATTERN" | sed 's/^/  /'
          else
            GLOBAL_CHANGE="false"
          fi

          # Pick candidate roles depending on the change scope above.
          if [ "$GLOBAL_CHANGE" = "true" ]; then
            CANDIDATE_ROLES=$(ls -d roles/*/ 2>/dev/null | cut -d'/' -f2 | sort -u | while read -r role; do
              if [ -d "roles/${role}/molecule" ]; then
                echo "$role"
              fi
            done)
            echo "Candidate roles (all roles with molecule/):"
          else
            CANDIDATE_ROLES=$(echo "$CHANGED_FILES" | grep '^roles/' | cut -d'/' -f2 | sort -u | while read -r role; do
              if [ -d "roles/${role}/molecule" ]; then
                echo "$role"
              fi
            done)
            echo "Candidate roles (changed in PR with molecule/):"
          fi
          echo "$CANDIDATE_ROLES" | sed 's/^/  /'

          # Build matrix: for each candidate role, find all scenarios with ENABLE_CI
          MATRIX="[]"
          for role in $CANDIDATE_ROLES; do
            for scenario_dir in roles/${role}/molecule/*/; do
              scenario=$(basename "$scenario_dir")
              if [ -f "${scenario_dir}ENABLE_CI" ]; then
                MATRIX=$(echo "$MATRIX" | jq -c ". + [{\"role\": \"${role}\", \"scenario\": \"${scenario}\"}]")
                echo "  ${role} / ${scenario} (ENABLE_CI found)"
              else
                echo "  ${role} / ${scenario} (skipped, no ENABLE_CI)"
              fi
            done
          done

          echo "Matrix: $MATRIX"
          JOBS=$(echo "$MATRIX" | jq length)

          if [ "$JOBS" -eq 0 ]; then
            echo "has_jobs=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_jobs=true" >> "$GITHUB_OUTPUT"
          fi

          echo "matrix=$(echo "$MATRIX" | jq -c '.')" >> "$GITHUB_OUTPUT"

  test:
    name: "${{ matrix.role }} / ${{ matrix.scenario }}"
    needs: detect
    if: needs.detect.outputs.has_jobs == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/kogeler/mini_pig

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade ansible-core ansible-lint molecule "molecule-plugins[podman]"

      - name: Install collection dependencies
        working-directory: ansible_collections/kogeler/mini_pig
        run: |
          python3 -c "
          import yaml, subprocess, sys
          with open('galaxy.yml') as f:
              deps = yaml.safe_load(f).get('dependencies', {})
          for name, ver in deps.items():
              spec = f'{name}:{ver}' if ver else name
              subprocess.check_call(['ansible-galaxy', 'collection', 'install', spec, '--force'])
          "

      - name: Run ansible-lint
        working-directory: ansible_collections/kogeler/mini_pig/roles/${{ matrix.role }}
        run: ansible-lint

      # Run the scenario through `molecule test`, which executes the
      # `test_sequence` declared in the scenario's `molecule.yml`. The
      # workflow stays agnostic about whether a scenario opts in or out of
      # idempotence / lint / side_effect — that decision belongs to the
      # scenario itself. `--base-config` silently ignores missing paths,
      # so this works whether or not the role has a shared base file.
      - name: Molecule test
        working-directory: ansible_collections/kogeler/mini_pig/roles/${{ matrix.role }}
        run: molecule -c molecule/shared/base.yml test -s "${{ matrix.scenario }}"
